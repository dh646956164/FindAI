name: Refresh curated AI tool intelligence

on:
  schedule:
    - cron: "20 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-tool-intelligence
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check official pages and public updates
        run: node scripts/refresh-tool-intelligence.mjs

      - name: Commit refreshed static data
        run: |
          if git diff --quiet -- data/tool-intelligence.json; then
            echo "No intelligence changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tool-intelligence.json
          git commit -m "chore: refresh curated tool intelligence"
          git push

      - name: Prepare static-only build
        run: rm -rf app/admin app/api middleware.ts

      - name: Build refreshed static site
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy refreshed site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
