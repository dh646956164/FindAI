name: Refresh curated AI tool intelligence

on:
  schedule:
    - cron: "20 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-tool-intelligence
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check official pages and public updates
        run: node scripts/refresh-tool-intelligence.mjs

      - name: Commit refreshed static data
        run: |
          if git diff --quiet -- data/tool-intelligence.json; then
            echo "No intelligence changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tool-intelligence.json
          git commit -m "chore: refresh curated tool intelligence"
          git push
