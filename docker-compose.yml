services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-intel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_intel
    ports:
      - "5432:5432"
    volumes:
      - ai_intel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_intel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ai_intel_pgdata:
